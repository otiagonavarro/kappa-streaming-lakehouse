services:

  # ── Kafka (Redpanda) ──────────────────────────────────────────────────────
  broker:
    image: redpandadata/redpanda:v23.3.6
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://broker:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redpanda Console (UI) ─────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.4.3
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: broker:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://broker:9644
    depends_on:
      broker:
        condition: service_healthy

  # ── MinIO (local GCS proxy) ───────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-03-13T23-51-57Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/$${MINIO_BUCKET:-kappa-lake};
        mc mb --ignore-existing local/flink-checkpoints;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-kappa-lake}

  # ── Project Nessie REST catalog ────────────────────────────────────────────
  # Also exposes an Iceberg-REST-compatible endpoint (nessie.catalog.*) at
  # /iceberg/main, consumed by Doris' Iceberg multi-catalog federation below.
  nessie:
    image: ghcr.io/projectnessie/nessie:0.108.2
    ports:
      - "19120:19120"
    environment:
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://${MINIO_BUCKET:-kappa-lake}/warehouse
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      # urn:nessie-secret indirection for STATIC auth is unreliable in this
      # image (matches a known upstream issue); use the AWS SDK's ambient
      # credential chain instead, fed by the AWS_* env vars below.
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE: APPLICATION_GLOBAL
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL serving layer ───────────────────────────────────────────────
  postgres:
    image: postgres:15.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kappa}
      POSTGRES_USER: ${POSTGRES_USER:-kappa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kappa}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-kappa} -d $${POSTGRES_DB:-kappa}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ── Flyway DB migrations ──────────────────────────────────────────────────
  db-migrate:
    image: flyway/flyway:10.10.0
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kappa} -user=${POSTGRES_USER:-kappa} -password=${POSTGRES_PASSWORD:-kappa} -locations=filesystem:/flyway/sql migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/flyway/sql

  # ── Flink JobManager ──────────────────────────────────────────────────────
  jobmanager:
    build:
      context: ..
      dockerfile: infra/job-submitter/Dockerfile
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        rest.port: 8081
        state.backend: filesystem
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        s3.endpoint: ${MINIO_ENDPOINT:-http://minio:9000}
        s3.access-key: ${MINIO_ACCESS_KEY:-minioadmin}
        s3.secret-key: ${MINIO_SECRET_KEY:-minioadmin}
        s3.path.style.access: true
        pekko.framesize: 2147483647b
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # ── Flink TaskManager ─────────────────────────────────────────────────────
  taskmanager:
    build:
      context: ..
      dockerfile: infra/job-submitter/Dockerfile
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        rest.port: 8081
        taskmanager.numberOfTaskSlots: 16
        taskmanager.memory.process.size: 4096m
        state.backend: filesystem
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        s3.endpoint: ${MINIO_ENDPOINT:-http://minio:9000}
        s3.access-key: ${MINIO_ACCESS_KEY:-minioadmin}
        s3.secret-key: ${MINIO_SECRET_KEY:-minioadmin}
        s3.path.style.access: true
        pekko.framesize: 2147483647b
    depends_on:
      jobmanager:
        condition: service_healthy

  # ── Event Simulator ───────────────────────────────────────────────────────
  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-broker:9092}
      SIMULATOR_RATE: ${SIMULATOR_RATE:-10}
      SIMULATOR_TOPIC: ${SIMULATOR_TOPIC:-raw-events}
      SIMULATOR_ENTITY_TOPIC: ${SIMULATOR_ENTITY_TOPIC:-entity-updates}
    depends_on:
      broker:
        condition: service_healthy

  # ── Job Submitter (init) ──────────────────────────────────────────────────
  job-submitter:
    build:
      context: ..
      dockerfile: infra/job-submitter/Dockerfile
    environment:
      FLINK_JOBMANAGER_HOST: ${FLINK_JOBMANAGER_HOST:-jobmanager}
      FLINK_JOBMANAGER_PORT: ${FLINK_JOBMANAGER_PORT:-8081}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-broker:9092}
      NESSIE_URI: ${NESSIE_URI:-http://nessie:19120/api/v1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-kappa-lake}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      GCS_BUCKET: ${GCS_BUCKET:-}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://kappa:kappa@postgres:5432/kappa}
      FLINK_CHECKPOINT_INTERVAL_MS: ${FLINK_CHECKPOINT_INTERVAL_MS:-30000}
      SIMULATOR_ENTITY_TOPIC: ${SIMULATOR_ENTITY_TOPIC:-entity-updates}
    depends_on:
      jobmanager:
        condition: service_healthy
      taskmanager:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
      broker:
        condition: service_healthy

  # ── Apache Doris FE (federated query engine over the Iceberg lakehouse) ────
  # Doris needs FE_SERVERS/BE_ADDR to carry a real, stable IP for its own
  # internal gossip protocol, so FE/BE are pinned to static addresses on the
  # default network instead of relying on Docker DNS for that handshake.
  doris-fe:
    image: apache/doris:fe-4.1.3
    networks:
      default:
        ipv4_address: 172.28.0.240
    environment:
      FE_SERVERS: fe1:172.28.0.240:9010
      FE_ID: "1"
    ports:
      - "8030:8030"
      - "9030:9030"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8030/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ── Apache Doris BE (storage/compute worker) ────────────────────────────────
  doris-be:
    image: apache/doris:be-4.1.3
    networks:
      default:
        ipv4_address: 172.28.0.241
    environment:
      FE_SERVERS: fe1:172.28.0.240:9010
      BE_ADDR: 172.28.0.241:9050
    depends_on:
      doris-fe:
        condition: service_healthy

  # ── Doris catalog bootstrap (init) ──────────────────────────────────────────
  # Registers two Doris catalogs:
  #   - "lakehouse": Iceberg REST federation over Nessie (bronze/silver/gold,
  #     zero re-ingestion).
  #   - "postgres": JDBC federation over the Postgres serving layer, so the
  #     same session_metrics/product_funnel_1m/users/products/orders tables
  #     that Flink upserts into Postgres are also queryable from Doris.
  doris-init:
    image: mysql:8.0
    depends_on:
      doris-fe:
        condition: service_healthy
      doris-be:
        condition: service_started
      nessie:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    entrypoint: >
      /bin/sh -c "
        until mysql -h doris-fe -P9030 -uroot -e 'SHOW BACKENDS\\G' 2>/dev/null | grep -q 'Alive: true'; do
          echo 'Waiting for Doris BE to register...'; sleep 5;
        done;
        mysql -h doris-fe -P9030 -uroot -e \"
          CREATE CATALOG IF NOT EXISTS lakehouse PROPERTIES (
            'type' = 'iceberg',
            'iceberg.catalog.type' = 'rest',
            'iceberg.rest.uri' = 'http://nessie:19120/iceberg',
            'warehouse' = 'warehouse',
            's3.endpoint' = '${MINIO_ENDPOINT:-http://minio:9000}',
            's3.region' = 'us-east-1',
            's3.access_key' = '${MINIO_ACCESS_KEY:-minioadmin}',
            's3.secret_key' = '${MINIO_SECRET_KEY:-minioadmin}',
            's3.use_path_style' = 'true',
            's3.path-style-access' = 'true',
            'metadata_refresh_interval_sec' = '30'
          );
        \";
        mysql -h doris-fe -P9030 -uroot -e \"
          CREATE CATALOG IF NOT EXISTS postgres PROPERTIES (
            'type' = 'jdbc',
            'user' = '${POSTGRES_USER:-kappa}',
            'password' = '${POSTGRES_PASSWORD:-kappa}',
            'jdbc_url' = 'jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kappa}',
            'driver_url' = 'https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.3/postgresql-42.7.3.jar',
            'driver_class' = 'org.postgresql.Driver'
          );
        \";
        echo 'Doris lakehouse + postgres catalogs ready.';
      "

  # ── Cube.js semantic layer (BI API over Doris) ──────────────────────────────
  cube:
    image: cubejs/cube:latest
    environment:
      CUBEJS_DB_TYPE: mysql
      CUBEJS_DB_HOST: doris-fe
      CUBEJS_DB_PORT: "9030"
      CUBEJS_DB_NAME: lakehouse.gold
      CUBEJS_DB_USER: root
      CUBEJS_DB_PASS: ""
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-dev-secret-change-me}
      CUBEJS_DEV_MODE: "true"
    ports:
      - "4000:4000"
    volumes:
      - ../cube/model:/cube/conf/model
    depends_on:
      doris-init:
        condition: service_completed_successfully

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  minio-data:
  postgres-data:
